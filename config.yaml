# ── Chromium Code Assistant — central config ───────────────────────────────
# Edit these once; every script reads from here (no env vars needed).

repo:
  # Absolute path to the chromium *src* checkout (your vibeus/chromium mirror).
  # WSL tip: cloning inside WSL (~/src/...) is much faster than /mnt/c/...
  path: ~/R148/chromium/src
  url: https://github.com/vibeus/chromium

# Milestone anchors for the "evolution" signal. Vibe uses milestone *branches*
# (not Chromium tags): R148 is this year's default, R136 was last year's.
# The range from_ref..to_ref captures both upstream Chromium evolution AND the
# vibe downstream commits layered on top.
#   List them with:  git -C <repo.path> branch -r | grep -E 'origin/R[0-9]+$'
versions:
  from_ref: "origin/R136"   # last year's default branch  (the "before")
  to_ref:   "origin/R148"   # this year's default branch   (the "after")
  label_from: "R136"        # short labels used in metadata/prompts
  label_to:   "R148"

# Directories worth indexing/extracting first. The full tree is too big — start
# focused, widen later. Paths are relative to repo.path.
include_dirs:
  - base
  - content
  - components
  - mojo
  - ui
  - chrome/browser
  - docs

# Source extensions to index for RAG / diff extraction.
extensions: [".cc", ".h", ".mojom", ".ts", ".js", ".md"]

# Commit selection from the from_ref..to_ref range (170k+ raw commits — must filter).
provenance:
  # A commit is "official" (upstream Chromium) if its body has these markers OR
  # its author email matches these domains; otherwise it's "vibe" (downstream).
  official_body_markers: ["Cr-Commit-Position", "chromium-review.googlesource.com", "Cr-Original-Commit-Position"]
  official_email_domains: ["@chromium.org", "@google.com"]
  # Drop service-account / automation churn by EMAIL substring. NOTE: do NOT
  # blanket-skip "[bot]" — github-actions[bot] is vibe's CI doing real R136->R148
  # porting ("windows_streaming: ... (R148)"), which is prime evolution signal.
  skip_email_patterns: ["autoroll", "luci-bisection", "swarming-tasks", "chops-service-accounts", "gserviceaccount.com"]
  skip_subject_patterns: ["Roll ", "chore(DEPS)", "DEPS: roll", "Update V8 to", "Automatic update"]
  keep_all_vibe: true             # keep EVERY vibe commit (the company-specific signal)
  # SFT-ONLY cap: limits official commits that get diffs + teacher distillation.
  # The evolution RAG index is DECOUPLED — it ingests ALL official messages
  # (commits_all.jsonl), so this cap does NOT limit historical retrieval.
  max_official_commits: 8000      # sampled (chronologically spread) for the fine-tune set

dataset:
  teacher_model: deepseek-chat                 # DeepSeek-V3; OpenAI-compatible, China-friendly billing
  teacher_base_url: https://api.deepseek.com   # set OPENAI_API_KEY to your DeepSeek key (sk-...)
  teacher_concurrency: 12         # parallel requests (DeepSeek allows high concurrency)
  max_teacher_commits: 3000       # budget cap for "why" distillation (03b)
  max_task_teacher_commits: 1500  # budget cap for task->code distillation (03e)
  max_diff_chars: 20000           # truncate giant diffs
  train_split: 0.97
  # Per-source caps balance the mix so the bulky FREE generators don't swamp the
  # scarce TEACHER pairs (which read more naturally). null / omit = keep all.
  # Rough target after caps: ~half "why" / half generation; teacher pairs kept whole.
  source_caps:
    sft_programmatic.jsonl: 6000        # "why" (free, ~2/commit) — verbose, cap it
    sft_teacher.jsonl: null             # "why" (teacher) — keep all
    sft_tasks_programmatic.jsonl: 6000  # generation (free, task->diff) — cap it
    sft_tasks_teacher.jsonl: null       # generation (teacher) — keep all

train:
  base_model: unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit
  max_seq_len: 2048
  lora_r: 32
  lora_alpha: 32
  batch_size: 2
  grad_accum: 8
  epochs: 2
  learning_rate: 0.0002
  output_dir: out
  gguf_quant: q4_k_m

rag:
  db_path: rag_db
  embed_model: BAAI/bge-base-en-v1.5
  code_collection: code_r148
  evolution_collection: evolution
  chunk_size: 1500
  chunk_overlap: 300
  top_k_code: 6
  top_k_evolution: 4

serve:
  # Upstream model endpoint the RAG proxy forwards to.
  #   Ollama: http://localhost:11434/v1/chat/completions
  #   vLLM:   http://localhost:8000/v1/chat/completions
  model_url: http://localhost:11434/v1/chat/completions
  model_name: chromium-coder
  proxy_port: 9000

# A/B eval (07_eval.py): same RAG context, different models. Lets you measure
# whether the fine-tune actually beats base+RAG before investing in it.
# Each system is called only if its endpoint is reachable (and key present);
# unreachable ones are skipped, so you can run with whatever you have up.
eval:
  systems:
    - name: base+RAG          # base model, NO fine-tune (the baseline to beat)
      base_url: http://localhost:11434/v1
      model: qwen2.5-coder:7b-instruct
      api_key_env: null
    - name: ft+RAG            # your fine-tuned model
      base_url: http://localhost:11434/v1
      model: chromium-coder
      api_key_env: null
    - name: frontier+RAG      # strong cloud model, identical RAG context (DeepSeek here)
      base_url: https://api.deepseek.com
      model: deepseek-chat
      api_key_env: OPENAI_API_KEY
